name: Build and Release Jobs Journal (macOS)

on:
  push:
    tags:
      - 'v*'  # Runs on new version tags
  workflow_dispatch:  # Allows manual runs

jobs:
  build-macos:
    runs-on: macos-latest  # Only run on macOS (for now)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build Tauri App (macOS)
        run: cargo tauri build

      - name: Upload macOS Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jobs-journal-macos
          path: src-tauri/target/release/bundle/macos/**/*

  release:
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: jobs-journal-macos

      - name: Create Release and Upload macOS Binary
        uses: softprops/action-gh-release@v1
        with:
          files: jobs-journal-macos/**/*
          tag_name: ${{ github.ref }}
          name: Jobs Journal Alpha macOS ${{ github.ref_name }}
          draft: false
          prerelease: true
